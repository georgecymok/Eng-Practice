<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>英语口语练习</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f8fafc; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 内置图标
        const Icons = {
            mic: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>,
            square: <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>,
            volume2: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>,
            refresh: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>,
            book: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>,
            headset: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg>,
            chat: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>,
            left: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"></polyline></svg>,
            right: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
        };

        // ==========================================
        // ！！！重要：请在这里填入您的 Gemini API Key ！！！
        // ==========================================
        const GEMINI_API_KEY = "AIzaSyAd7jSRg_klzL1g3EN-Gp0vS06Vui2DLpA"; 

        function App() {
            const [mode, setMode] = useState('daily');
            const [level, setLevel] = useState('intermediate');
            const [items, setItems] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [loading, setLoading] = useState(false);
            const [recording, setRecording] = useState(false);
            const [transcript, setTranscript] = useState('');
            const [result, setResult] = useState('none');
            const [errorMsg, setErrorMsg] = useState(null);

            const recognitionRef = useRef(null);

            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    const recognition = new SpeechRecognition();
                    recognition.lang = 'en-US';
                    recognition.interimResults = true;
                    recognition.onstart = () => { setRecording(true); setTranscript(''); setResult('none'); };
                    recognition.onend = () => setRecording(false);
                    recognition.onresult = (event) => {
                        let text = Array.from(event.results).map(r => r[0].transcript).join('');
                        setTranscript(text);
                        if (event.results[0].isFinal) {
                            const target = items[currentIndex].en.toLowerCase().replace(/[^\w\s]/g, '').trim();
                            const input = text.toLowerCase().replace(/[^\w\s]/g, '').trim();
                            setResult(input.includes(target) || target.includes(input) ? 'correct' : 'incorrect');
                        }
                    };
                    recognitionRef.current = recognition;
                }
                loadContent();
            }, [mode, level]);

            const loadContent = async () => {
                if (!GEMINI_API_KEY || GEMINI_API_KEY.includes("替换")) {
                    setErrorMsg("API Key 未配置，请检查代码第48行");
                    return;
                }
                setLoading(true);
                setErrorMsg(null);
                try {
                    const prompt = `Generate 8 unique English sentences for ${level} level. Mode: ${mode}. Return as a JSON array of objects with 'en' and 'zh' keys. No other text.`;
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY.trim()}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
                    });
                    
                    const data = await response.json();
                    if (data.error) {
                        throw new Error(`API错误: ${data.error.message}`);
                    }
                    
                    const text = data.candidates[0].content.parts[0].text;
                    const parsed = JSON.parse(text);
                    setItems(parsed);
                    setCurrentIndex(0);
                } catch (err) {
                    console.error(err);
                    setErrorMsg(err.message || "网络请求失败");
                    // 只有在彻底失败时才显示默认句子
                    if (items.length === 0) {
                        setItems([{en: "The API call failed. Please check your key.", zh: "API 调用失败，请检查您的 Key。"}]);
                    }
                } finally {
                    setLoading(false);
                }
            };

            const playAudio = (text) => {
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'en-US'; u.rate = 0.7;
                window.speechSynthesis.speak(u);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 flex flex-col shadow-xl relative">
                    <header className="bg-white p-4 border-b flex justify-between items-center sticky top-0 z-10">
                        <div className="flex items-center space-x-2">
                            <h1 className="font-bold text-indigo-600">英语练习</h1>
                            <button onClick={loadContent} className="p-1 text-slate-400 hover:text-indigo-600 transition-colors">
                                {Icons.refresh}
                            </button>
                        </div>
                        <select value={level} onChange={e => setLevel(e.target.value)} className="text-xs bg-slate-100 rounded px-2 py-1 outline-none">
                            <option value="intermediate">中级</option>
                            <option value="advanced">高级</option>
                        </select>
                    </header>

                    <main className="flex-1 p-6 flex flex-col items-center justify-center">
                        {loading ? (
                            <div className="flex flex-col items-center space-y-4">
                                <div className="loading-spinner"></div>
                                <p className="text-sm text-slate-400">正在从 AI 获取新句子...</p>
                            </div>
                        ) : items.length > 0 ? (
                            <div className="w-full space-y-6">
                                <div className="bg-white p-8 rounded-3xl shadow-sm border text-center relative">
                                    <button onClick={() => playAudio(items[currentIndex].en)} className="absolute top-4 right-4 text-indigo-500 p-2 bg-indigo-50 rounded-full">
                                        {Icons.volume2}
                                    </button>
                                    <div className="text-xs text-slate-300 absolute top-4 left-6">{currentIndex + 1} / {items.length}</div>
                                    <h2 className="text-xl font-bold text-slate-800 mb-4 mt-2 leading-tight">{items[currentIndex].en}</h2>
                                    <p className="text-slate-500 text-sm">{items[currentIndex].zh}</p>
                                </div>

                                <div className={`p-4 rounded-2xl text-center min-h-[80px] flex flex-col justify-center transition-colors ${result === 'correct' ? 'bg-green-100 text-green-700' : result === 'incorrect' ? 'bg-red-50 text-red-700' : 'bg-slate-100'}`}>
                                    {transcript ? <p className="font-medium">"{transcript}"</p> : <p className="text-slate-400 text-xs">点击紫色麦克风开始朗读</p>}
                                    {result === 'correct' && <p className="text-[10px] mt-1 font-bold">✓ 完美！</p>}
                                    {result === 'incorrect' && <p className="text-[10px] mt-1 font-bold">× 没听清，再试一次</p>}
                                </div>

                                <div className="flex justify-between items-center px-4">
                                    <button onClick={() => setCurrentIndex(Math.max(0, currentIndex-1))} disabled={currentIndex===0} className="p-3 text-slate-300 disabled:opacity-20">{Icons.left}</button>
                                    <button onClick={() => recording ? recognitionRef.current.stop() : recognitionRef.current.start()} className={`w-16 h-16 rounded-full flex items-center justify-center text-white shadow-lg transition-all ${recording ? 'bg-red-500 scale-110' : 'bg-indigo-600'}`}>
                                        {recording ? Icons.square : Icons.mic}
                                    </button>
                                    <button onClick={() => setCurrentIndex(Math.min(items.length-1, currentIndex+1))} disabled={currentIndex===items.length-1} className="p-3 text-slate-300 disabled:opacity-20">{Icons.right}</button>
                                </div>
                                
                                {errorMsg && <div className="text-[10px] text-red-400 text-center bg-red-50 p-2 rounded-lg">错误提示: {errorMsg}</div>}
                            </div>
                        ) : null}
                    </main>

                    <nav className="bg-white border-t flex justify-around p-3 sticky bottom-0">
                        <button onClick={() => setMode('daily')} className={`flex flex-col items-center ${mode === 'daily' ? 'text-indigo-600' : 'text-slate-300'}`}>{Icons.book}<span className="text-[10px] mt-1">每日</span></button>
                        <button onClick={() => setMode('listening')} className={`flex flex-col items-center ${mode === 'listening' ? 'text-indigo-600' : 'text-slate-300'}`}>{Icons.headset}<span className="text-[10px] mt-1">听力</span></button>
                        <button onClick={() => setMode('dialogue')} className={`flex flex-col items-center ${mode === 'dialogue' ? 'text-indigo-600' : 'text-slate-300'}`}>{Icons.chat}<span className="text-[10px] mt-1">对话</span></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
