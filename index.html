<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>每日英语口语进阶</title>
    <!-- 引入基础库 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f8fafc; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root">
        <!-- 初始加载提示，防止白屏 -->
        <div id="fallback-loader" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #64748b;">
            <div class="loading-spinner"></div>
            <p style="margin-top: 16px;">正在启动英语学习系统...</p>
            <p style="font-size: 12px; margin-top: 8px; opacity: 0.6;">如果长时间无反应，请检查网络或 API Key 配置</p>
        </div>
    </div>

    <script type="text/babel">
        // 错误捕获：如果发生崩溃，直接显示在屏幕上
        window.onerror = function(msg, url, line) {
            const root = document.getElementById('root');
            root.innerHTML = `<div style="padding: 20px; color: red; background: #fee2e2; margin: 20px; border-radius: 8px;">
                <h3 style="font-weight: bold">程序启动失败</h3>
                <p style="font-size: 14px">${msg}</p>
                <p style="font-size: 12px; margin-top: 10px">请检查 API Key 是否填写正确，并确保在 HTTPS 环境下运行。</p>
            </div>`;
            return false;
        };

        const { useState, useEffect, useRef } = React;

        // ==========================================
        // ！！！重要：请在这里填入您的 Gemini API Key ！！！
        // ==========================================
        const GEMINI_API_KEY = "请将这行文字替换为您的真实API_KEY，保留双引号"; 

        // 内置 SVG 图标
        const Icons = {
            mic: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>,
            square: <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>,
            checkCircle: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>,
            volume2: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>,
            refreshCw: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>,
            bookOpen: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>,
            headphones: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg>,
            messageCircle: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>,
            chevronLeft: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"></polyline></svg>,
            chevronRight: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
        };

        const normalizeText = (text) => text.toLowerCase().replace(/[^\w\s]/g, '').trim();

        function App() {
            const [mode, setMode] = useState('daily');
            const [level, setLevel] = useState('intermediate');
            const [items, setItems] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [loading, setLoading] = useState(false);
            const [recording, setRecording] = useState(false);
            const [transcript, setTranscript] = useState('');
            const [result, setResult] = useState('none');
            const [errorMsg, setErrorMsg] = useState(null);

            const recognitionRef = useRef(null);

            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    const recognition = new SpeechRecognition();
                    recognition.lang = 'en-US';
                    recognition.interimResults = true;
                    recognition.onstart = () => { setRecording(true); setTranscript(''); setResult('none'); };
                    recognition.onend = () => setRecording(false);
                    recognition.onresult = (event) => {
                        let text = Array.from(event.results).map(r => r[0].transcript).join('');
                        setTranscript(text);
                        if (event.results[0].isFinal) checkPronunciation(text);
                    };
                    recognitionRef.current = recognition;
                }
                loadContent();
            }, [mode, level]);

            const loadContent = async () => {
                if (!GEMINI_API_KEY || GEMINI_API_KEY.includes("替换")) {
                    setErrorMsg("请先在代码中配置您的 API Key");
                    return;
                }
                setLoading(true);
                setErrorMsg(null);
                try {
                    const prompt = `Generate 8 English sentences for ${level} level. Mode: ${mode}. Return JSON array with 'en' and 'zh'.`;
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
                    });
                    const data = await response.json();
                    const text = data.candidates[0].content.parts[0].text;
                    setItems(JSON.parse(text));
                } catch (err) {
                    setErrorMsg("内容加载失败，请检查 API Key 或网络");
                    setItems([{en: "Hello, how are you today?", zh: "你好，今天怎么样？"}]);
                } finally {
                    setLoading(false);
                }
            };

            const checkPronunciation = (spoken) => {
                const target = normalizeText(items[currentIndex].en);
                const input = normalizeText(spoken);
                setResult(input.includes(target) || target.includes(input) ? 'correct' : 'incorrect');
            };

            const playAudio = (text) => {
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'en-US';
                u.rate = 0.7; // 慢速播放
                window.speechSynthesis.speak(u);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 flex flex-col shadow-xl">
                    <header className="bg-white p-4 border-b flex justify-between items-center sticky top-0 z-10">
                        <h1 className="font-bold text-indigo-600 text-lg">英语口语进阶</h1>
                        <select value={level} onChange={e => setLevel(e.target.value)} className="text-sm bg-slate-100 rounded px-2 py-1">
                            <option value="intermediate">中级</option>
                            <option value="advanced">高级</option>
                        </select>
                    </header>

                    <main className="flex-1 p-6 flex flex-col items-center justify-center space-y-8">
                        {loading ? (
                            <div className="loading-spinner"></div>
                        ) : items.length > 0 ? (
                            <div className="w-full space-y-6">
                                <div className="bg-white p-8 rounded-3xl shadow-sm border text-center relative">
                                    <button onClick={() => playAudio(items[currentIndex].en)} className="absolute top-4 right-4 text-indigo-500 p-2 bg-indigo-50 rounded-full">
                                        {Icons.volume2}
                                    </button>
                                    <h2 className="text-2xl font-bold text-slate-800 mb-4">{items[currentIndex].en}</h2>
                                    <p className="text-slate-500">{items[currentIndex].zh}</p>
                                </div>

                                <div className={`p-4 rounded-2xl text-center min-h-[80px] flex flex-col justify-center ${result === 'correct' ? 'bg-green-100 text-green-700' : 'bg-slate-100'}`}>
                                    {transcript ? <p className="font-medium">"{transcript}"</p> : <p className="text-slate-400 text-sm">点击麦克风开始朗读</p>}
                                    {result === 'correct' && <p className="text-xs mt-1 font-bold">完美！发音正确</p>}
                                </div>

                                <div className="flex justify-between items-center px-4">
                                    <button onClick={() => setCurrentIndex(Math.max(0, currentIndex-1))} className="p-3 text-slate-400">{Icons.chevronLeft}</button>
                                    <button onClick={() => recording ? recognitionRef.current.stop() : recognitionRef.current.start()} className={`w-20 h-20 rounded-full flex items-center justify-center text-white shadow-lg transition-all ${recording ? 'bg-red-500 scale-110' : 'bg-indigo-600'}`}>
                                        {recording ? Icons.square : Icons.mic}
                                    </button>
                                    <button onClick={() => setCurrentIndex(Math.min(items.length-1, currentIndex+1))} className="p-3 text-slate-400">{Icons.chevronRight}</button>
                                </div>
                            </div>
                        ) : <p className="text-red-500">{errorMsg}</p>}
                    </main>

                    <nav className="bg-white border-t flex justify-around p-4 sticky bottom-0">
                        <button onClick={() => setMode('daily')} className={`flex flex-col items-center ${mode === 'daily' ? 'text-indigo-600' : 'text-slate-400'}`}>{Icons.bookOpen}<span className="text-[10px] mt-1">每日</span></button>
                        <button onClick={() => setMode('listening')} className={`flex flex-col items-center ${mode === 'listening' ? 'text-indigo-600' : 'text-slate-400'}`}>{Icons.headphones}<span className="text-[10px] mt-1">听力</span></button>
                        <button onClick={() => setMode('dialogue')} className={`flex flex-col items-center ${mode === 'dialogue' ? 'text-indigo-600' : 'text-slate-400'}`}>{Icons.messageCircle}<span className="text-[10px] mt-1">对话</span></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
